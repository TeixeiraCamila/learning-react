<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memorização - Rocketseet - React.js</title>
  </head>
  <body>
    <div
      id="root"
      class="bg-slate-950 text-wrap min-h-screen text-red-50"
    ></div>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const users = [
        { id: 1, name: 'Gustavo' },
        { id: 2, name: 'Rodrigo' },
        { id: 3, name: 'Sofia' },
        { id: 4, name: 'Laura' },
        { id: 5, name: 'Leonardo' },
      ]

      function App() {
        const [search, setSearch] = React.useState('')
        const [count, setCount] = React.useState(0)
        console.log('Renderizando App')
        const filteredUsers = React.useMemo(() => {
          console.log('Filtrando usuários')
          return users.filter((user) =>
            user.name.toLowerCase().includes(search.toLowerCase())
          )
        }, [search])
        return (
          <main className={`p-4 gap-5 flex flex-col`}>
            <div className="flex gap-2">
              <input
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                type="text"
                className="p-2 rounded bg-slate-800"
                placeholder="Buscar usuários"
              />
              <button
                className="p-2 rounded bg-gray-400 text-gray-800 font-bold hover:bg-gray-300 cursor-pointer"
                onClick={() => setCount(count + 1)}
              >
                Re-render {count}
              </button>
            </div>
            <ul>
              {filteredUsers.map((user) => (
                <li key={user.id}>{user.name}</li>
              ))}
            </ul>
          </main>
        )
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
